<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- NW Monogram -->
  <g transform="translate(20, 15)">
    <path d="M0 0 L25 0 L35 35 L45 0 L70 0 L70 70 L50 70 L50 35 L40 70 L25 70 L15 35 L15 70 L0 70 Z" 
          fill="url(#grad2)" filter="url(#glow2)"/>
  </g>
  
  <!-- Company Name -->
  <text x="110" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">Nordic</text>
  <text x="110" y="68" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF">Webpartner</text>
  
  <!-- Decorative line -->
  <rect x="110" y="75" width="180" height="2" fill="#00D4FF" opacity="0.8"/>
</svg>
